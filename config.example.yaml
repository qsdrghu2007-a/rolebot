# Telegram聊天机器人配置文件示例
# 复制此文件为 config.yaml 并填写API密钥和信息
# 或运行 setup.py 进行交互式配置

llm:
  api_key: "sk-your-api-key"              # 支持任何 OpenAI 兼容 API（DeepSeek / OpenAI / Groq / 本地模型等）
  base_url: "https://api.deepseek.com"    # 修改为你的服务商地址
  model: "deepseek-v4-flash"              # 修改为你的模型名称

bot:
  language: "zh"                           # 默认语言：zh(中文) / en(English)，首次 setup 后自动设置

telegram:
  bot_token: "your-telegram-bot-token"
  allowed_user_ids: []
  enable_group_chat: false
  admin_user_ids: []
  connect_timeout: 30
  read_timeout: 30

memory:
  db_path: "memory.db"
  max_history: 150
  max_tokens: 16000

prompt:
  max_prompt_length: 10000
  include_recent_messages: 50
  include_memories: 50
  max_world_book_entries: 5

logging:
  level: "INFO"
  file: "bot.log"
  chat_log: "chat_history.log"

advanced:
  temperature: 0.78
  max_tokens_per_response: 1024
  retry_attempts: 3
  timeout_seconds: 30
